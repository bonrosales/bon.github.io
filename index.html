<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bon Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f6f9;
}

/* HEADER */

header{
position:sticky;
top:0;
background:#1877f2;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

/* HERO */

.hero{
padding:80px 20px;
text-align:center;
background:white;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:#555;
}

/* DASHBOARD */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
color:#1877f2;
}

/* LATEST POST */

.latest{
padding:40px;
}

.post{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
width:100%;
background:#111;
color:white;
text-align:center;
padding:10px;
opacity:0;
transition:opacity 0.5s;
}

/* MOBILE */

@media(max-width:600px){

.hero h1{
font-size:28px;
}

nav a{
margin-left:10px;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
Bon Portal
</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="timeline.html">Timeline</a>
</nav>

</header>

<section class="hero">

<h1>Welcome</h1>

<p>Your personal media portal</p>

</section>

<section class="dashboard">

<div class="card">
<h2>120</h2>
<p>Total Photos</p>
</div>

<div class="card">
<h2>45</h2>
<p>Total Videos</p>
</div>

<div class="card">
<h2>30</h2>
<p>Total Posts</p>
</div>

</section>

<section class="latest">

<h2 style="margin-bottom:20px;">Latest Post</h2>

<div class="post">
<p>This will show the latest timeline post.</p>
</div>

</section>

<footer id="footer">

© 2026 Bon Portal

</footer>

<script>

/* FOOTER SHOW / HIDE ON SCROLL */

let lastScroll = 0;
let footer = document.getElementById("footer");

window.addEventListener("scroll",function(){

let currentScroll = window.pageYOffset;

if(currentScroll > lastScroll){

footer.style.opacity = "1";

}else{

footer.style.opacity = "0";

}

lastScroll = currentScroll;

});

</script>

</body>
</html>
